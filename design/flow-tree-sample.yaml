      ui_experiment_id: wizard-stepper
      artifacts:
        - design/ui-invoice-approval.md
      prototype_path: prototypes/invoice-approval/variation-1/
    - id: cli-policy-validation-probe
      label: CLI policy validation probe
      status: pending
      user_flow_branch_id: submit-and-approve
      ux_variation_id: guided-wizard
      artifacts:
        - design/prototype-build-plan-invoice-approval.md
      prototype_path: prototypes/invoice-approval/platform-probes/cli-policy-validation/
      platform_probe:
        platform: cli
        probe_type: cli_script
        risk_tested: Whether finance operations can inspect policy failures without bypassing invoice approval authority.
        evidence_target: Operations lead can run the command, read the audit output, and confirm it cannot approve or mutate invoices.
        non_visual: true
      notes: Thin platform probe only; keep approval workflow in the primary web app prototype.
