schema_version: v0.5
topic: invoice-approval
mode: flat
route:
  - user-flow-map
  - ux-variations
  - ui-interview
  - logic-wiring
  - consolidate-prototypes
  - spec-interview
source_artifacts:
  - design/user-flow-invoice-approval.md
platform_fit:
  candidates:
    - platform: web_app
      fit: high
      evidence_basis: Finance reviewers work from desktop browsers inside existing approval queues.
      moment_of_need: Reviewer opens a pending invoice, checks policy status, and approves during an accounting review block.
      job_shape: Dense review, exception inspection, and auditable approval actions fit a browser workspace.
      adoption_friction: Low because users already authenticate into the finance portal.
      permission_or_trust_burden: Moderate because invoice data and approval authority must be explicit and auditable.
      distribution_fit: Strong fit for internal rollout through the existing finance web entry point.
      monetization_fit: Strong fit for seat-based back-office workflow value.
      technical_leverage: Reuses existing browser auth, policy checks, and audit logs.
      fatal_risks: []
      required_probe: Validate reviewer comprehension of policy exceptions in the web approval path.
      status: selected
    - platform: cli
      fit: medium
      evidence_basis: Finance operations may need batch approval diagnostics, but primary approvers are not command-line users.
      moment_of_need: Operations lead audits blocked approvals or reruns policy validation outside the UI.
      job_shape: Batch inspection and repair commands fit a CLI, but primary invoice approval does not.
      adoption_friction: High for ordinary reviewers; acceptable for finance operations.
      permission_or_trust_burden: High because shell access must never bypass approval authority.
      distribution_fit: Narrow internal tool distribution.
      monetization_fit: Companion efficiency value only.
      technical_leverage: Can reuse policy validation logic and emit machine-readable audit output.
      fatal_risks:
        - CLI could be mistaken for an approval bypass if authority boundaries are unclear.
      required_probe: Build a thin validation command that proves audit clarity without approving invoices.
      status: probe
    - platform: native_mobile
      fit: low
      evidence_basis: Current evidence shows approval happens during focused desk review rather than on-the-go triage.
      moment_of_need: Occasional notification triage, not full approval review.
      job_shape: Complex line-item and policy inspection is weak on small screens.
      adoption_friction: Medium because app installation adds a rollout step.
      permission_or_trust_burden: High due to sensitive finance data on personal devices.
      distribution_fit: Weak until mobile approvals become frequent.
      monetization_fit: Low incremental value for the current MVP.
      technical_leverage: Limited reuse beyond notification hooks.
      fatal_risks:
        - Reviewers may approve without enough line-item context.
      required_probe: Defer until UAT shows frequent mobile approval demand.
      status: defer
  recommendation:
    primary: web_app
    companion:
      - cli
    defer:
      - native_mobile
    reject:
      - marketplace_multi_sided
      - game_playable
    decision_rationale: Build the web approval path as the primary product and probe a non-visual CLI validation companion only for finance operations audit risk.
branch_order_override:
  scope: user-flow
  ordered_branch_ids:
    - submit-and-approve
  override_rationale: User asked to validate invoice submission before recovery or reporting flows.
  recorded_at: "2026-06-21T00:00:00Z"
branches:
  - id: submit-and-approve
    label: Submit and approve an invoice
    status: ready-for-ui
    journey_stage: activation
    journey_sequence: 1
    priority_rationale: Submission and approval is the first value path before exceptions, recovery, or reporting.
    progressive_review:
      first_value_step: Submit a complete invoice for approval.
      primary_task_path: Draft invoice -> submit -> reviewer approves.
      staged_disclosure_notes: Start with the submit-and-approve path, then expose exception handling and dense finance controls after the primary path is understood.
      evidence_required:
        - Reviewer can complete the primary approval path without rule confusion.
        - Submitter understands the approval status after submission.
    # v0.2 primary per-user-flow-branch model attachment (state-model).
    model_ref: design/model-tree-invoice-approval-submit-and-approve.yaml
    artifacts:
      - design/user-flow-invoice-approval.md
    ux_variations:
      - id: guided-wizard
        label: Guided multi-step wizard
        status: approved
        evaluation_priority: 1
        activation_fit: high
        first_value_fit: high
        priority_rationale: The wizard isolates one decision at a time and reaches approval with the least reviewer setup.
        progressive_review:
          first_value_step: Complete the first approval step in the wizard.
          primary_task_path: Review invoice summary -> confirm policy checks -> approve.
          staged_disclosure_notes: Reveal approval context first, then add line-item details and policy exceptions.
          evidence_required:
            - Reviewer can identify the next required wizard action.
            - Reviewer can approve without opening secondary panels.
        artifacts:
          - design/ux-variations-invoice-approval.md
        ui_experiments:
          - id: wizard-stepper
            status: approved
            artifacts:
              - design/ui-invoice-approval.md
            experiment_path: experiments/invoice-approval/wizard-stepper/
            review_evidence: alignment/build-ui-screens-invoice-approval.html#wizard-stepper-review
            decision_id: approve-wizard-stepper
            # v0.4 flow-walk: per-screen JIT state-model attachment.
            model_ref: design/model-tree-invoice-approval-submit-and-approve.yaml
            # v0.4 flow-walk: ordered per-screen build ledger (build-ui-screens writes, logic-wiring advances).
            build_ledger:
              - id: step-summary
                flow_step: Review invoice summary
                status: wired
                elements_added:
                  - invoice header
                  - line-item summary table
                  - approve action
                notes: Minimum UI reached after the approve action; logic-wiring made the step clickable.
              - id: step-policy
                flow_step: Confirm policy checks
                status: minimum-ui-reached
                elements_added:
                  - policy checklist
                  - exception banner
                notes: Visual stop rule fired; awaiting logic-wiring.
      - id: single-page-dense
        label: Single dense review page
        status: retry-needed
        evaluation_priority: 2
        activation_fit: medium
        first_value_fit: low
        priority_rationale: The dense page may help expert reviewers later, but it delays first value for new approvers.
        progressive_review:
          first_value_step: Find the approve action on the dense page.
          primary_task_path: Scan invoice table -> inspect approval rule -> approve inline.
          staged_disclosure_notes: Validate the inline approval path before exposing filters, bulk actions, and accounting exports.
          evidence_required:
            - Reviewer can find the approve action without training.
            - Reviewer understands which approval authority rule applies.
        artifacts:
          - design/ux-variations-invoice-approval.md
        ui_experiments:
          - id: dense-table
            status: parked
            artifacts:
              - design/ui-invoice-approval.md
            decision_id: modify-dense-table
            # v0.4 flow-walk: parked screen flagged for consolidate-prototypes stage-1 cherry-pick.
            cherry_pick_candidate: true
            build_ledger:
              - id: step-dense-scan
                flow_step: Scan invoice table
                status: parked
                elements_added:
                  - dense invoice table
                notes: Parked out of this build pass; dense table worth stitching into the canonical flow later.
decisions:
  - id: approve-wizard-stepper
    branch_ref: submit-and-approve/guided-wizard/wizard-stepper
    decision: approve
    rationale: Prototype validated; reviewers completed approval without errors.
    recorded_at: "2026-06-21T00:00:00Z"
  - id: modify-dense-table
    branch_ref: submit-and-approve/single-page-dense/dense-table
    decision: modify
    # modify re-opens upstream nodes — here the per-branch model and the user-flow branch.
    targets:
      - design/model-tree-invoice-approval-submit-and-approve.yaml
      - submit-and-approve
    rationale: UAT showed the approval authority rule is wrong in the model; re-open the state-model before re-skinning.
    recorded_at: "2026-06-21T00:00:00Z"
